<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6b7280"/></marker>
    <marker id="g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#4ade80"/></marker>
  </defs>
  <!-- transparent background; boxes keep their dark fill -->

  <!-- agent (top) -->
  <rect x="340" y="34" width="220" height="72" rx="16" fill="#0e1a12" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="68" text-anchor="middle" font-size="18" font-weight="700" fill="#f4f4f5">◆ Agent</text>
  <text x="450" y="90" text-anchor="middle" font-size="12" fill="#9aa0a6">calls · receives JSON</text>

  <!-- spine arrows -->
  <line x1="450" y1="106" x2="450" y2="144" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="204" x2="450" y2="242" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="302" x2="450" y2="340" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- JSON back: parse -> agent -->
  <path d="M320 372 C 166 372 166 70 340 70" fill="none" stroke="#4ade80" stroke-width="1.7" marker-end="url(#g)"/>
  <text x="158" y="228" text-anchor="end" font-size="12.5" font-weight="700" fill="#4ade80">JSON back</text>

  <!-- step 1 -->
  <rect x="320" y="144" width="260" height="60" rx="12" fill="#141417" stroke="#2a2a30"/>
  <circle cx="320" cy="174" r="15" fill="#4ade80"/><text x="320" y="179" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0d">1</text>
  <text x="350" y="170" font-size="15" font-weight="700" fill="#f4f4f5">navigate</text>
  <text x="350" y="189" font-size="12" fill="#9aa0a6">open the site — session ready</text>

  <!-- step 2 -->
  <rect x="320" y="242" width="260" height="60" rx="12" fill="#141417" stroke="#2a2a30"/>
  <circle cx="320" cy="272" r="15" fill="#4ade80"/><text x="320" y="277" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0d">2</text>
  <text x="350" y="268" font-size="15" font-weight="700" fill="#f4f4f5" font-family="ui-monospace, Menlo, monospace">call(params)</text>
  <text x="350" y="287" font-size="12" fill="#9aa0a6">run the extractor in the page</text>

  <!-- step 3 -->
  <rect x="320" y="340" width="260" height="60" rx="12" fill="#141417" stroke="#2a2a30"/>
  <circle cx="320" cy="370" r="15" fill="#4ade80"/><text x="320" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0d">3</text>
  <text x="350" y="366" font-size="15" font-weight="700" fill="#f4f4f5">parse</text>
  <text x="350" y="385" font-size="12" fill="#9aa0a6">shape the response into JSON</text>

  <!-- store offshoot (in the browser) -->
  <line x1="580" y1="272" x2="620" y2="272" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#g)"/>
  <rect x="622" y="244" width="248" height="56" rx="12" fill="#141417" stroke="#2a2a30"/>
  <text x="642" y="268" font-size="12" fill="#e5e7eb">store <tspan font-family="ui-monospace, Menlo, monospace" fill="#f4f4f5">evaluate.js</tspan> in the browser</text>
  <text x="642" y="287" font-size="11.5" font-family="ui-monospace, Menlo, monospace" fill="#4ade80">→ NEEDS_STORE</text>

  <!-- legend -->
  <text x="450" y="452" text-anchor="middle" font-size="12" fill="#6b7280">a skill = <tspan font-family="ui-monospace, Menlo, monospace" fill="#c9ced4">SKILL.md</tspan> (recipe) + <tspan font-family="ui-monospace, Menlo, monospace" fill="#c9ced4">evaluate.js</tspan> (extractor)   ·   cookies never leave the browser</text>
</svg>
